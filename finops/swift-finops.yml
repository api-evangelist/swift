  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: SWIFT
providerId: swift
publisherName: S.W.I.F.T. SC
serviceCategory: Financial Messaging & Cross-Border Payments
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Banking
  - Financial Messaging
  - Payments
  - ISO 20022
description: SWIFT bills members under the cooperative's published-but-member-only pricing schedule
  (annual support charges, traffic charges by message class, service-specific fees). This artifact captures
  publisher and category surface only; meters are placeholders pending member-only pricing access.
sources:
  - https://www.swift.com
notes: 'Reconciliation marked false: SWIFT pricing is private to members. No public per-call rate card.'
billingModel:
  pricingCategory: Member-Tiered Cooperative Pricing
  billingFrequency: Annual + Per-Message Settlement
  billingCurrency: EUR
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
focusColumns:
  ServiceName: SWIFT
  ServiceCategory: Financial Messaging
  ProviderName: SWIFT
  PublisherName: S.W.I.F.T. SC
  InvoiceIssuerName: S.W.I.F.T. SC
  BillingCurrency: EUR
meters:
  - name: messaging_traffic
    description: SWIFT message traffic billed by tier and message type (FIN, MX, ISO 20022); rates per
      member's traffic band
    unit: message
    aggregation: sum
    dimensions:
      - message_type
      - service
      - member_tier
  - name: annual_membership
    description: Annual support and membership fee scaled by member share class
    unit: year
    aggregation: max
    dimensions:
      - member_class
  - name: service_charges
    description: Service-specific fees (gpi, KYC Registry, Sanctions Screening, Transaction Screening,
      Compliance Analytics)
    unit: varies
    aggregation: sum
    dimensions:
      - service
principles:
  - name: Visibility
    description: Visibility into SWIFT spend is via the member's SWIFTNet billing files and the swift.com
      member portal, not a public usage API.
  - name: Allocation
    description: Allocate by message type and originating business line; SWIFT bill files itemize traffic
      by service and BIC.
  - name: Optimization
    description: Optimization levers include traffic-band selection at year-end, consolidating BICs,
      using Alliance Cloud or Lite2 to reduce on-prem operating cost, and leaning on shared services.
  - name: Accountability
    description: Account ownership rests with the institution's payments operations and SWIFT relationship
      manager; review against the annual SWIFT pricing notification.
maintainers:
