specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: SWIFT
providerId: swift
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Banking
  - Cross-Border Payments
  - Financial Messaging
  - Financial Services
  - GPI
  - ISO 20022
  - Payments
description: SWIFT (S.W.I.F.T. SC) is a member-owned cooperative providing financial messaging and APIs
  to financial institutions. Access is restricted to member institutions and onboarded counterparties;
  pricing is tiered by member traffic class and contracted services rather than published as a public
  per-call rate card.
sources:
  - https://www.swift.com
  - https://developer.swift.com
notes: 'Reconciliation marked false: SWIFT does not publish public per-call API pricing. The developer
  portal and corporate site time out or redirect for automated fetch. Commercial terms (membership fees,
  message charges, traffic-band tiers) are governed by the SWIFT membership and service-level agreements
  and are not public.'
plans:
  - id: swift-contact-sales
    name: Contact Sales
    type: enterprise
    description: SWIFT API and messaging access requires SWIFT membership or sponsored connectivity.
      Pricing is tiered by member class and traffic band under the SWIFT pricing schedule, which is not
      publicly disclosed.
    entries:
      - label: Membership & Messaging Contract
        name: contract
        type: subscription
        metric: varies
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: SWIFT Membership Required
      - name: Tiered Member Pricing (Traffic Bands)
      - name: Service-Specific Charges (gpi, KYC, Sanctions, ISO 20022)
