naftiko: 1.0.0-alpha2
info:
  label: SWIFT Payment Validation
  description: Unified payment validation capability combining the SWIFT SwiftRef reference data API. Enables payment operations
    teams and fintech developers to validate BICs, IBANs, LEIs, and routing codes before payment execution to achieve higher
    straight-through processing rates.
  tags:
  - BIC Validation
  - Financial Services
  - IBAN Validation
  - ISO 20022
  - Payments
  - Reference Data
  - SWIFT
  - Validation
  created: '2026-05-03'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    SWIFT_CLIENT_ID: SWIFT_CLIENT_ID
    SWIFT_CLIENT_SECRET: SWIFT_CLIENT_SECRET
capability:
  consumes:
  - type: http
    namespace: swiftref
    baseUri: https://api.swift.com/swiftrefdata
    description: SWIFT SwiftRef reference data lookup and validation
    authentication:
      type: bearer
      token: '{{SWIFTREF_ACCESS_TOKEN}}'
    resources:
    - name: bics
      path: /v2/bics/{bic}
      description: BIC lookup and validation
      operations:
      - name: get-bic
        method: GET
        description: Get BIC Details
        inputParameters:
        - name: bic
          in: path
          type: string
          required: true
          description: 8 or 11 character BIC
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: validate-bic
        method: GET
        description: Validate BIC
        inputParameters:
        - name: bic
          in: path
          type: string
          required: true
          description: BIC to validate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: ibans
      path: /v2/ibans/{iban}
      description: IBAN lookup and validation
      operations:
      - name: get-iban
        method: GET
        description: Get IBAN Details
        inputParameters:
        - name: iban
          in: path
          type: string
          required: true
          description: IBAN without spaces
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: validate-iban
        method: GET
        description: Validate IBAN
        inputParameters:
        - name: iban
          in: path
          type: string
          required: true
          description: IBAN to validate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-bic-for-iban
        method: GET
        description: Get BIC for IBAN
        inputParameters:
        - name: iban
          in: path
          type: string
          required: true
          description: IBAN to resolve BIC for
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: leis
      path: /v2/leis/{lei}
      description: LEI lookup and validation
      operations:
      - name: get-lei
        method: GET
        description: Get LEI Details
        inputParameters:
        - name: lei
          in: path
          type: string
          required: true
          description: 20-character LEI
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: validate-lei
        method: GET
        description: Validate LEI
        inputParameters:
        - name: lei
          in: path
          type: string
          required: true
          description: LEI to validate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: national-ids
      path: /v2/national_ids/{national_id}
      description: National ID lookup
      operations:
      - name: get-national-id
        method: GET
        description: Get National ID Details
        inputParameters:
        - name: national_id
          in: path
          type: string
          required: true
          description: National clearing code or routing number
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: validate-national-id
        method: GET
        description: Validate National ID
        inputParameters:
        - name: national_id
          in: path
          type: string
          required: true
          description: National ID to validate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: swift-validation-api
    description: Unified REST API for SWIFT financial identifier validation.
    resources:
    - path: /v1/bics/{bic}
      name: bics
      description: Validate and look up BIC details
      operations:
      - method: GET
        name: get-bic
        description: Get BIC Details
        call: swiftref.get-bic
        with:
          bic: rest.bic
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/bics/{bic}/validity
      name: bic-validity
      description: Validate a BIC
      operations:
      - method: GET
        name: validate-bic
        description: Validate BIC
        call: swiftref.validate-bic
        with:
          bic: rest.bic
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/ibans/{iban}
      name: ibans
      description: Look up IBAN details and BIC
      operations:
      - method: GET
        name: get-iban
        description: Get IBAN Details
        call: swiftref.get-iban
        with:
          iban: rest.iban
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/ibans/{iban}/validity
      name: iban-validity
      description: Validate an IBAN
      operations:
      - method: GET
        name: validate-iban
        description: Validate IBAN
        call: swiftref.validate-iban
        with:
          iban: rest.iban
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/leis/{lei}
      name: leis
      description: Look up LEI details
      operations:
      - method: GET
        name: get-lei
        description: Get LEI Details
        call: swiftref.get-lei
        with:
          lei: rest.lei
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/national-ids/{national_id}
      name: national-ids
      description: Look up national clearing codes
      operations:
      - method: GET
        name: get-national-id
        description: Get National ID Details
        call: swiftref.get-national-id
        with:
          national_id: rest.national_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: swift-validation-mcp
    transport: http
    description: MCP server for AI-assisted SWIFT payment identifier validation.
    tools:
    - name: get-bic
      description: Look up BIC details including institution name, country, and SWIFT connectivity
      hints:
        readOnly: true
        idempotent: true
      call: swiftref.get-bic
      with:
        bic: tools.bic
      outputParameters:
      - type: object
        mapping: $.
    - name: validate-bic
      description: Validate a BIC is registered and active in the SWIFT network
      hints:
        readOnly: true
        idempotent: true
      call: swiftref.validate-bic
      with:
        bic: tools.bic
      outputParameters:
      - type: object
        mapping: $.
    - name: get-bic-sepa-reachability
      description: Check whether a BIC is reachable via SEPA CT, DD, or Instant schemes
      hints:
        readOnly: true
        idempotent: true
      call: swiftref.get-bic
      with:
        bic: tools.bic
      outputParameters:
      - type: object
        mapping: $.
    - name: get-iban
      description: Look up IBAN details including associated BIC, bank code, and account structure
      hints:
        readOnly: true
        idempotent: true
      call: swiftref.get-iban
      with:
        iban: tools.iban
      outputParameters:
      - type: object
        mapping: $.
    - name: validate-iban
      description: Validate IBAN format, check digits, country code, and BBAN structure
      hints:
        readOnly: true
        idempotent: true
      call: swiftref.validate-iban
      with:
        iban: tools.iban
      outputParameters:
      - type: object
        mapping: $.
    - name: get-bic-for-iban
      description: Resolve the BIC routing code for a given IBAN
      hints:
        readOnly: true
        idempotent: true
      call: swiftref.get-bic-for-iban
      with:
        iban: tools.iban
      outputParameters:
      - type: object
        mapping: $.
    - name: get-lei
      description: Look up Legal Entity Identifier details and GLEIF registration status
      hints:
        readOnly: true
        idempotent: true
      call: swiftref.get-lei
      with:
        lei: tools.lei
      outputParameters:
      - type: object
        mapping: $.
    - name: validate-lei
      description: Validate a Legal Entity Identifier is active in GLEIF
      hints:
        readOnly: true
        idempotent: true
      call: swiftref.validate-lei
      with:
        lei: tools.lei
      outputParameters:
      - type: object
        mapping: $.
    - name: get-national-id
      description: Look up national clearing code or routing number details and associated BICs
      hints:
        readOnly: true
        idempotent: true
      call: swiftref.get-national-id
      with:
        national_id: tools.national_id
      outputParameters:
      - type: object
        mapping: $.
