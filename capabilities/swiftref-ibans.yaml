      description: Get IBAN Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: swiftref-ibans.getiban
      outputParameters:
      - type: object
        mapping: $.
    - name: get-bic-iban
      description: Get BIC for IBAN
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: swiftref-ibans.getbicforiban
      outputParameters:
      - type: object
        mapping: $.
    - name: validate-iban
      description: Validate IBAN
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: swiftref-ibans.validateiban
      outputParameters:
      - type: object
        mapping: $.
