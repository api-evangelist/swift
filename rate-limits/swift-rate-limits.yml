specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: SWIFT
providerId: swift
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Banking
  - Financial Messaging
  - Payments
  - Rate Limiting
description: SWIFT does not publish public per-second rate limits for its APIs in a developer-portal
  page accessible without authentication. Throttling behavior, retry semantics, and idempotency are documented
  inside the SWIFT developer portal which requires a member SwiftNet account.
sources:
  - https://developer.swift.com
notes: 'Reconciliation marked false: SWIFT developer portal is gated behind member authentication; corporate
  site times out for automated fetch. Limits are documented per-API inside the authenticated portal.'
responseCodes:
  throttled: 429
limits:
  - name: SwiftNet API Limits (Member-Authenticated)
    scope: api-key
    metric: varies
    limit: documented per-API inside the authenticated SWIFT developer portal
    notes: Per-API rate limits, retry-after headers, and idempotency conventions are published only
      to authenticated members.
policies:
  - name: Member-Authenticated Documentation
    description: SWIFT documents API throttling, retry, idempotency, and scoping inside the SWIFT developer
      portal; consumers must be onboarded SwiftNet members to access the published numbers.
maintainers:
